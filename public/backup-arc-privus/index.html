<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>ARC Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0b141a;
}

/* LAYOUT */
.app {
  display: flex;
  height: 100vh;
}

/* SIDEBAR */
.sidebar {
  width: 30%;
  background: #111b21;
  border-right: 1px solid #222;
  color: white;
  padding: 10px;
}

/* CHAT */
.chat {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* HEADER */
.header {
  background: #202c33;
  color: white;
  padding: 10px;
}

/* MENSAJES */
.messages {
  flex: 1;
  padding: 10px;
  overflow-y: auto;
  background: #0b141a;
}

/* BURBUJAS */
.msg {
  padding: 10px;
  border-radius: 10px;
  margin: 5px 0;
  max-width: 60%;
}

.user {
  background: #005c4b;
  color: white;
  margin-left: auto;
}

.ai {
  background: #202c33;
  color: white;
}

/* INPUT */
.input {
  display: flex;
  padding: 10px;
  background: #202c33;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  outline: none;
}

button {
  padding: 10px;
  background: #00a884;
  border: none;
  color: white;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="app">

  <div class="sidebar">
    <h3>Chats</h3>
    <div>🤖 AI Madre</div>
  </div>

  <div class="chat">
    <div class="header">AI Madre</div>

    <div class="messages" id="messages"></div>

    <div class="input">
      <input id="input" placeholder="Escribe..." />
      <button onclick="send()">Enviar</button>
    </div>
  </div>

</div>

<script>

const userId = "arnaldo"; // 🔥 FORZADO

const messages = document.getElementById("messages");
const input = document.getElementById("input");

/* AGREGAR MENSAJE */
function add(text, type){
  const d = document.createElement("div");
  d.className = "msg " + type;
  d.innerText = text;
  messages.appendChild(d);
  messages.scrollTop = messages.scrollHeight;
}

/* HISTORIAL */
async function loadHistory(){
  try {
    const res = await fetch("/api/chat/history?userId=" + userId);
    const data = await res.json();

    if(data.history){
      data.history.forEach(m=>{
        add(m.content, m.role === "user" ? "user" : "ai");
      });
    }
  } catch(e){
    console.log("Error historial");
  }
}

/* ENVIAR */
async function send(){
  const m = input.value.trim();
  if(!m) return;

  add(m, "user");
  input.value = "";

  add("Escribiendo...", "ai");

  try {
    const res = await fetch("/api/chat", {
      method: "POST",
      headers: {"Content-Type":"application/json"},
      body: JSON.stringify({
        message: m,
        userId: userId
      })
    });

    const d = await res.json();

    messages.lastChild.remove();
    add(d.reply || "Sin respuesta", "ai");

  } catch(e){
    messages.lastChild.remove();
    add("Error conectando", "ai");
  }
}

/* ENTER */
input.addEventListener("keypress", e=>{
  if(e.key === "Enter") send();
});

/* INICIAR */
loadHistory();
add("IA lista 🔥", "ai");

</script>

</body>
</html>
