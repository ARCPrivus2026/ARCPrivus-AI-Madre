<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ARC Privus AI Madre</title>

  <link rel="stylesheet" href="style.css" />

 <style>
body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#061225;
    color:white;
    height:100vh;
    overflow:hidden;
}

#chat{
    height:calc(100vh - 70px);
    overflow-y:auto;
    padding:15px;
    box-sizing:border-box;
}

.msg{
    max-width:80%;
    padding:12px;
    margin:10px 0;
    border-radius:15px;
    word-wrap:break-word;
    box-shadow:0 0 10px rgba(0,0,0,0.3);
}

.user{
    background:#0084ff;
    margin-left:auto;
    text-align:right;
    color:white;
}

.ai{
    background:#111827;
    border:1px solid #00ccff;
    color:#00e5ff;
}

#box{
    position:fixed;
    bottom:0;
    left:0;
    width:100%;
    display:flex;
    background:#0b162d;
    padding:10px;
    box-sizing:border-box;
    border-top:1px solid #1e293b;
}

#msg{
    flex:1;
    padding:12px;
    border:none;
    border-radius:12px;
    outline:none;
    background:#1e293b;
    color:white;
    font-size:16px;
}

button{
    margin-left:10px;
    padding:12px 18px;
    border:none;
    border-radius:12px;
    background:#00ccff;
    color:white;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0099cc;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="login-box">
  <h1>ARC Privus AI Madre</h1>
  <p>Inteligencia artificial automática</p>

  <input id="user" placeholder="Usuario" />
  <input id="pass" type="password" placeholder="Contraseña" />

 <button onclick="window.location.href='chat.html'">
Entrar
</button>
  <button onclick="register()">Crear cuenta</button>

  <small>Diagnóstico, soluciones técnicas y negocios con IA</small>
</div>

<!-- APP -->
<div id="app" class="app" style="display:none;">

  <aside class="sidebar">
    <h2>ARC Privus</h2>
    <p id="planText">Plan: free</p>

    <button onclick="newChat()">+ Nuevo chat</button>
    <button onclick="logout()">Salir</button>

    <h3>Chats</h3>
    <div id="chatList"></div>
  </aside>

  <main class="chat">
    <header class="header">
      <h2 id="chatName">AI Madre</h2>
      <small>IA automática en línea</small>
    </header>

    <section id="messages" class="messages"></section>

    <section class="suggestions">
      <button onclick="quickAsk('Mi nevera no enfría abajo, ¿qué puede ser?')">
        Nevera no enfría
      </button>

      <button onclick="quickAsk('Mi lavadora no centrifuga, ¿qué reviso primero?')">
        Lavadora no centrifuga
      </button>

      <button onclick="quickAsk('Quiero una idea de negocio rentable con IA')">
        Negocio con IA
      </button>
    </section>

    <footer class="input-area">
      <textarea id="input" placeholder="Escribe tu problema o pregunta..."></textarea>
      <button onclick="send()">Enviar</button>
    </footer>

  </main>

</div>

<script src="/socket.io/socket.io.js"></script>
<script src="app.js"></script>

</body>
</html>
