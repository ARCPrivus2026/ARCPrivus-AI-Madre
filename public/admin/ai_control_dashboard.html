<!DOCTYPE html><html lang="es">
<head>
<meta charset="UTF-8">
<title>ARC Privus AI Madre - Panel de Control</title><style>

body{
background:#061225;
color:white;
font-family:Arial;
margin:0;
padding:0;
}

header{
background:#081c34;
padding:15px;
text-align:center;
font-size:24px;
color:#00eaff;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.panel{
background:#0d2a4f;
padding:15px;
border-radius:10px;
box-shadow:0 0 10px #000;
}

h2{
color:#00eaff;
}

pre{
background:#000;
padding:10px;
border-radius:6px;
overflow:auto;
}

.status-ok{
color:#00ff88;
}

.status-warning{
color:#ffaa00;
}

.status-error{
color:#ff4444;
}

</style></head><body><header>
ARC PRIVUS AI MADRE - PANEL DE CONTROL
</header><div class="container"><div class="grid"><div class="panel">
<h2>Estado del Sistema</h2>
<div id="status">Cargando...</div>
</div><div class="panel">
<h2>Módulos Activos</h2>
<pre id="modules"></pre>
</div><div class="panel">
<h2>Archivos de Memoria</h2>
<pre id="memory"></pre>
</div><div class="panel">
<h2>Advertencias</h2>
<pre id="warnings"></pre>
</div></div></div><script>

async function loadSystem(){

try{

const res = await fetch("/api/system-awareness");
const data = await res.json();

const summary = data.summary || {};

document.getElementById("status").innerHTML =
"Estado: <b>"+summary.status+"</b>";

document.getElementById("modules").textContent =
JSON.stringify(summary.modulesActive || [],null,2);

document.getElementById("memory").textContent =
JSON.stringify(summary.memoryFiles || [],null,2);

document.getElementById("warnings").textContent =
JSON.stringify(summary.warnings || [],null,2);

}catch(e){

console.log(e);

}

}

setInterval(loadSystem,3000);

loadSystem();

</script></body>
</html>
